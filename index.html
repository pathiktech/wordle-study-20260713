<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Wordle</title>
  <style>
    :root {
      --bg: #121213;
      --tile: #121213;
      --border: #3a3a3c;
      --text: #f8f8f8;
      --muted: #818384;
      --green: #538d4e;
      --yellow: #b59f3b;
      --gray: #3a3a3c;
      --key: #818384;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #202124 0, var(--bg) 42%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 12px 24px;
    }
    header {
      width: min(520px, 100%);
      text-align: center;
      border-bottom: 1px solid #303134;
      padding-bottom: 12px;
      margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: clamp(1.7rem, 7vw, 2.8rem); letter-spacing: .08em; }
    .subtitle { color: #c9c9c9; margin-top: 8px; font-size: .95rem; }
    #board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 7px;
      width: min(350px, 92vw);
      margin: 8px auto 18px;
    }
    .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .tile {
      aspect-ratio: 1;
      border: 2px solid var(--border);
      display: grid;
      place-items: center;
      font-size: clamp(1.65rem, 10vw, 2.2rem);
      font-weight: 800;
      text-transform: uppercase;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
      user-select: none;
    }
    .tile.filled { border-color: #565758; animation: pop .09s ease; }
    .tile.correct { background: var(--green); border-color: var(--green); }
    .tile.present { background: var(--yellow); border-color: var(--yellow); }
    .tile.absent { background: var(--gray); border-color: var(--gray); }
    @keyframes pop { 50% { transform: scale(1.08); } }
    .message {
      min-height: 36px;
      display: grid;
      place-items: center;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }
    .toast {
      background: #f8f8f8;
      color: #121213;
      border-radius: 6px;
      padding: 8px 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    #keyboard { width: min(520px, 100%); display: grid; gap: 8px; }
    .keyrow { display: flex; justify-content: center; gap: 6px; }
    button {
      border: 0;
      border-radius: 5px;
      background: var(--key);
      color: var(--text);
      height: 52px;
      min-width: 31px;
      padding: 0 10px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      touch-action: manipulation;
    }
    button.wide { min-width: 56px; font-size: .75rem; }
    button.correct { background: var(--green); }
    button.present { background: var(--yellow); }
    button.absent { background: var(--gray); }
    .actions { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .actions button { height: 42px; text-transform: none; background: #2f80ed; }
    .hint { margin-top: 12px; color: #aeb0b4; font-size: .86rem; text-align: center; max-width: 480px; }
  </style>
</head>
<body>
  <header>
    <h1>STUDY WORDLE</h1>
    <div class="subtitle">Guess today's 5-letter word in 6 tries.</div>
  </header>

  <main aria-label="Wordle game">
    <section id="board" aria-label="Game board"></section>
    <div class="message" id="message" aria-live="polite"></div>
    <section id="keyboard" aria-label="Keyboard"></section>
    <div class="actions"><button id="reset">Play again</button><button id="share">Share result</button></div>
    <div class="hint">Today's answer is locked to <strong>STUDY</strong>. Keyboard input works too.</div>
  </main>

  <script>
    const ANSWER = 'STUDY';
    const ROWS = 6;
    const COLS = 5;
    const board = document.getElementById('board');
    const keyboard = document.getElementById('keyboard');
    const message = document.getElementById('message');
    let row = 0, col = 0, gameOver = false;
    let guesses = Array.from({ length: ROWS }, () => Array(COLS).fill(''));
    const keyRanks = {};

    function buildBoard() {
      board.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        const rowEl = document.createElement('div');
        rowEl.className = 'row';
        for (let c = 0; c < COLS; c++) {
          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.id = `tile-${r}-${c}`;
          rowEl.appendChild(tile);
        }
        board.appendChild(rowEl);
      }
    }

    function buildKeyboard() {
      keyboard.innerHTML = '';
      ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'].forEach((letters, index) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'keyrow';
        if (index === 2) rowEl.appendChild(keyButton('Enter', 'wide'));
        letters.split('').forEach(l => rowEl.appendChild(keyButton(l)));
        if (index === 2) rowEl.appendChild(keyButton('⌫', 'wide'));
        keyboard.appendChild(rowEl);
      });
    }

    function keyButton(label, cls = '') {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.className = cls;
      btn.dataset.key = label === '⌫' ? 'Backspace' : label;
      btn.addEventListener('click', () => handleKey(btn.dataset.key));
      return btn;
    }

    function show(text, sticky = false) {
      message.innerHTML = text ? `<span class="toast">${text}</span>` : '';
      if (!sticky && text) setTimeout(() => { if (message.textContent === text) message.innerHTML = ''; }, 1400);
    }

    function handleKey(key) {
      if (gameOver && key !== 'Enter') return;
      if (/^[a-zA-Z]$/.test(key)) addLetter(key.toUpperCase());
      else if (key === 'Backspace') removeLetter();
      else if (key === 'Enter') submitGuess();
    }

    function addLetter(letter) {
      if (col >= COLS || row >= ROWS) return;
      guesses[row][col] = letter;
      const tile = document.getElementById(`tile-${row}-${col}`);
      tile.textContent = letter;
      tile.classList.add('filled');
      col++;
    }

    function removeLetter() {
      if (col <= 0 || gameOver) return;
      col--;
      guesses[row][col] = '';
      const tile = document.getElementById(`tile-${row}-${col}`);
      tile.textContent = '';
      tile.className = 'tile';
    }

    function scoreGuess(guess) {
      const result = Array(COLS).fill('absent');
      const counts = {};
      for (let i = 0; i < COLS; i++) {
        if (guess[i] === ANSWER[i]) result[i] = 'correct';
        else counts[ANSWER[i]] = (counts[ANSWER[i]] || 0) + 1;
      }
      for (let i = 0; i < COLS; i++) {
        if (result[i] === 'correct') continue;
        if (counts[guess[i]] > 0) { result[i] = 'present'; counts[guess[i]]--; }
      }
      return result;
    }

    function updateKey(letter, status) {
      const rank = { absent: 1, present: 2, correct: 3 };
      if ((keyRanks[letter] || 0) >= rank[status]) return;
      keyRanks[letter] = rank[status];
      document.querySelectorAll(`button[data-key="${letter}"]`).forEach(b => {
        b.classList.remove('absent', 'present', 'correct');
        b.classList.add(status);
      });
    }

    function submitGuess() {
      if (gameOver) return resetGame();
      if (col < COLS) return show('Not enough letters');
      const guess = guesses[row].join('');
      const result = scoreGuess(guess);
      result.forEach((status, i) => {
        const tile = document.getElementById(`tile-${row}-${i}`);
        setTimeout(() => {
          tile.classList.add(status);
          updateKey(guess[i], status);
        }, i * 130);
      });
      if (guess === ANSWER) {
        gameOver = true;
        setTimeout(() => show(`Solved in ${row + 1}/6 🎉`, true), 760);
      } else if (row === ROWS - 1) {
        gameOver = true;
        setTimeout(() => show(`Game over — answer was ${ANSWER}`, true), 760);
      } else {
        row++; col = 0;
      }
    }

    function resetGame() {
      row = 0; col = 0; gameOver = false;
      guesses = Array.from({ length: ROWS }, () => Array(COLS).fill(''));
      for (const k in keyRanks) delete keyRanks[k];
      buildBoard(); buildKeyboard(); show('');
    }

    function shareResult() {
      const lines = [];
      for (let r = 0; r < ROWS; r++) {
        const guess = guesses[r].join('');
        if (!guess) break;
        lines.push(scoreGuess(guess).map(s => s === 'correct' ? '🟩' : s === 'present' ? '🟨' : '⬛').join(''));
      }
      const text = `Study Wordle ${gameOver && guesses.some(g => g.join('') === ANSWER) ? lines.length + '/6' : 'X/6'}\n${lines.join('\n')}`;
      if (navigator.share) navigator.share({ text });
      else navigator.clipboard.writeText(text).then(() => show('Result copied'));
    }

    document.addEventListener('keydown', e => handleKey(e.key));
    document.getElementById('reset').addEventListener('click', resetGame);
    document.getElementById('share').addEventListener('click', shareResult);
    buildBoard(); buildKeyboard();
  </script>
</body>
</html>
